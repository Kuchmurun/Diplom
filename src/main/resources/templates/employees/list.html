<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employees</title>
    <meta charset="UTF-8">
</head>
<body>

<h1>Employees</h1>

<a th:href="@{/clients}">Clients</a>
|
<a th:href="@{/credits}">Credit applications</a>
|
<a th:href="@{/audit}">Audit log</a>
|
<a th:href="@{/employees/new}">Create employee</a>

<br><br>

<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Full name</th>
        <th>Username</th>
        <th>Role</th>
        <th>Enabled</th>
        <th>Actions</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="employee : ${employees}">
        <td th:text="${employee.id}"></td>
        <td th:text="${employee.fullName}"></td>
        <td th:text="${employee.username}"></td>
        <td th:text="${employee.role}"></td>
        <td th:text="${employee.enabled}"></td>
        <td>
            <form method="post" th:action="@{/employees/{id}/toggle(id=${employee.id})}">
                <button type="submit">Enable / Disable</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<br>

<form method="post" th:action="@{/logout}">
    <button type="submit">Logout</button>
</form>

</body>
</html>
