<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employees</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/dashboard}">Pulsar Bank</a>

        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/clients}">Clients</a>
            <a class="nav-link" th:href="@{/credits}">Credit applications</a>
            <a class="nav-link" th:href="@{/reports}">Reports</a>
            <a class="nav-link" th:href="@{/audit}">Audit log</a>
            <a class="nav-link active" th:href="@{/employees}">Employees</a>
        </div>

        <form method="post" th:action="@{/logout}">
            <button class="btn btn-outline-light btn-sm">Logout</button>
        </form>
    </div>
</nav>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1>Employees</h1>

        <a class="btn btn-success" th:href="@{/employees/new}">
            Create employee
        </a>
    </div>

    <table class="table table-striped table-hover table-bordered shadow-sm bg-white">

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Full name</th>
            <th>Username</th>
            <th>Role</th>
            <th>Enabled</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="employee : ${employees}">

            <td th:text="${employee.id}"></td>

            <td th:text="${employee.fullName}"></td>

            <td th:text="${employee.username}"></td>

            <td>
                <span class="badge bg-primary"
                      th:text="${employee.role}">
                </span>
            </td>

            <td>
                <span class="badge"
                      th:classappend="${employee.enabled} ? ' bg-success' : ' bg-danger'"
                      th:text="${employee.enabled ? 'ACTIVE' : 'BLOCKED'}">
                </span>
            </td>

            <td>

                <a class="btn btn-warning btn-sm"
                   th:href="@{/employees/{id}/edit(id=${employee.id})}">
                    Edit
                </a>

                <form class="d-inline"
                      method="post"
                      th:action="@{/employees/{id}/toggle(id=${employee.id})}">

                    <button class="btn btn-secondary btn-sm"
                            type="submit">
                        Enable / Disable
                    </button>

                </form>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
