<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employee form</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/dashboard}">Pulsar Bank</a>

        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/clients}">Clients</a>
            <a class="nav-link" th:href="@{/credits}">Credit applications</a>
            <a class="nav-link" th:href="@{/reports}">Reports</a>
            <a class="nav-link" th:href="@{/audit}">Audit log</a>
            <a class="nav-link active" th:href="@{/employees}">Employees</a>
        </div>

        <form method="post" th:action="@{/logout}">
            <button class="btn btn-outline-light btn-sm">Logout</button>
        </form>
    </div>
</nav>

<div class="container mt-4">

    <div class="card shadow-sm">

        <div class="card-header">
            <h2 class="mb-0">Employee form</h2>
        </div>

        <div class="card-body">

            <form method="post"
                  th:action="${employee.id == null} ? @{/employees} : @{/employees/{id}/edit(id=${employee.id})}"
                  th:object="${employee}">

                <input th:field="*{id}" type="hidden">

                <div class="mb-3">
                    <label class="form-label">Full name</label>
                    <input class="form-control"
                           required
                           th:field="*{fullName}"
                           type="text">
                </div>

                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input class="form-control"
                           required
                           th:field="*{username}"
                           type="text">
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>

                    <input class="form-control"
                           th:field="*{password}"
                           th:required="${employee.id == null}"
                           type="password">

                    <small class="text-muted"
                           th:if="${employee.id != null}">
                        Leave empty to keep current password
                    </small>
                </div>

                <div class="mb-3">
                    <label class="form-label">Role</label>

                    <select class="form-select"
                            th:field="*{role}">

                        <option th:each="role : ${roles}"
                                th:text="${role}"
                                th:value="${role}">
                        </option>

                    </select>
                </div>

                <button class="btn btn-success"
                        type="submit">
                    Save
                </button>

                <a class="btn btn-secondary"
                   th:href="@{/employees}">
                    Back
                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
