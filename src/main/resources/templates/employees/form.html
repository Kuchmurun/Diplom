<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Сотрудник</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/dashboard}">Pulsar Bank</a>

        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/clients}">Клиенты</a>
            <a class="nav-link" th:href="@{/credits}">Кредитные заявки</a>
            <a class="nav-link" th:href="@{/reports}">Отчёты</a>
            <a class="nav-link" th:href="@{/audit}">Журнал действий</a>
            <a class="nav-link active" th:href="@{/employees}">Сотрудники</a>
        </div>

        <form method="post" th:action="@{/logout}">
            <button class="btn btn-outline-light btn-sm">Выйти</button>
        </form>
    </div>
</nav>

<div class="container mt-4">

    <div class="card shadow-sm">

        <div class="card-header">
            <h2 class="mb-0">Данные сотрудника</h2>
        </div>

        <div class="card-body">

            <form method="post"
                  th:action="${employee.id == null} ? @{/employees} : @{/employees/{id}/edit(id=${employee.id})}"
                  th:object="${employee}">

                <input th:field="*{id}" type="hidden">

                <div class="mb-3">
                    <label class="form-label">ФИО</label>

                    <input class="form-control"
                           required
                           th:field="*{fullName}"
                           type="text">
                </div>

                <div class="mb-3">
                    <label class="form-label">Логин</label>

                    <input class="form-control"
                           required
                           th:field="*{username}"
                           type="text">
                </div>

                <div class="mb-3">
                    <label class="form-label">Пароль</label>

                    <input class="form-control"
                           th:field="*{password}"
                           th:required="${employee.id == null}"
                           type="password">

                    <small class="text-muted"
                           th:if="${employee.id != null}">
                        Оставьте поле пустым, чтобы сохранить текущий пароль
                    </small>
                </div>

                <div class="mb-3">
                    <label class="form-label">Роль</label>

                    <select class="form-select"
                            th:field="*{role}">

                        <option th:each="role : ${roles}"
                                th:text="${role}"
                                th:value="${role}">
                        </option>

                    </select>
                </div>

                <button class="btn btn-success"
                        type="submit">
                    Сохранить
                </button>

                <a class="btn btn-secondary"
                   th:href="@{/employees}">
                    Назад
                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
