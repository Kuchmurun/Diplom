<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reports</title>
    <meta charset="UTF-8">
</head>
<body>

<h1>Reports</h1>

<a th:href="@{/dashboard}">Dashboard</a>
|
<a th:href="@{/clients}">Clients</a>
|
<a th:href="@{/credits}">Credit applications</a>
|
<a th:href="@{/audit}">Audit log</a>
|
<a th:href="@{/employees}">Employees</a>

<br><br>

<table border="1">
    <tr>
        <th>Report metric</th>
        <th>Value</th>
    </tr>
    <tr>
        <td>Total credit applications</td>
        <td th:text="${applicationsCount}"></td>
    </tr>
    <tr>
        <td>Approved applications</td>
        <td th:text="${approvedCount}"></td>
    </tr>
    <tr>
        <td>Rejected applications</td>
        <td th:text="${rejectedCount}"></td>
    </tr>
    <tr>
        <td>Manual review applications</td>
        <td th:text="${manualReviewCount}"></td>
    </tr>
    <tr>
        <td>Total approved amount</td>
        <td th:text="${totalApprovedAmount}"></td>
    </tr>
    <tr>
        <td>Average credit score</td>
        <td th:text="${averageScore}"></td>
    </tr>
</table>

</body>
</html>
