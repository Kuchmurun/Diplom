<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Client details</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/dashboard}">Pulsar Bank</a>

        <div class="navbar-nav">
            <a class="nav-link active" th:href="@{/clients}">Clients</a>
            <a class="nav-link" th:href="@{/credits}">Credit applications</a>
            <a class="nav-link" th:href="@{/reports}">Reports</a>
            <a class="nav-link" th:href="@{/audit}">Audit log</a>
            <a class="nav-link" th:href="@{/employees}">Employees</a>
        </div>

        <form method="post" th:action="@{/logout}">
            <button class="btn btn-outline-light btn-sm">Logout</button>
        </form>
    </div>
</nav>

<div class="container mt-4">

    <div class="card shadow-sm">
        <div class="card-header">
            <h2 class="mb-0">Client details</h2>
        </div>

        <div class="card-body">

            <table class="table table-bordered">
                <tr>
                    <th>ID</th>
                    <td th:text="${client.id}"></td>
                </tr>
                <tr>
                    <th>Full name</th>
                    <td th:text="${client.fullName}"></td>
                </tr>
                <tr>
                    <th>Gender</th>
                    <td th:text="${client.gender}"></td>
                </tr>
                <tr>
                    <th>Birth date</th>
                    <td th:text="${client.birthDate}"></td>
                </tr>
                <tr>
                    <th>Monthly income</th>
                    <td th:text="${client.monthlyIncome}"></td>
                </tr>
                <tr>
                    <th>Credit history score</th>
                    <td th:text="${client.creditHistoryScore}"></td>
                </tr>
                <tr>
                    <th>Current credit debt</th>
                    <td th:text="${client.currentCreditDebt}"></td>
                </tr>
                <tr>
                    <th>Criminal record</th>
                    <td th:text="${client.hasCriminalRecord}"></td>
                </tr>
            </table>

            <a class="btn btn-warning"
               th:href="@{/clients/{id}/edit(id=${client.id})}">
                Edit
            </a>

            <a class="btn btn-secondary"
               th:href="@{/clients}">
                Back
            </a>

        </div>
    </div>

</div>

</body>
</html>
