<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Информация о клиенте</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/dashboard}">Pulsar Bank</a>

        <div class="navbar-nav">
            <a class="nav-link active" th:href="@{/clients}">Клиенты</a>
            <a class="nav-link" th:href="@{/credits}">Кредитные заявки</a>
            <a class="nav-link" th:href="@{/reports}">Отчёты</a>
            <a class="nav-link" th:href="@{/audit}">Журнал действий</a>
            <a class="nav-link" th:href="@{/employees}">Сотрудники</a>
            <a class="nav-link" th:href="@{/backup}">Резервное копирование</a>
        </div>

        <form method="post" th:action="@{/logout}">
            <button class="btn btn-outline-light btn-sm">Выйти</button>
        </form>
    </div>
</nav>

<div class="container mt-4">

    <div class="card shadow-sm">
        <div class="card-header">
            <h2 class="mb-0">Информация о клиенте</h2>
        </div>

        <div class="card-body">

            <table class="table table-bordered">

                <tr>
                    <th>ID</th>
                    <td th:text="${client.id}"></td>
                </tr>

                <tr>
                    <th>ФИО</th>
                    <td th:text="${client.fullName}"></td>
                </tr>

                <tr>
                    <th>Пол</th>
                    <td th:text="${client.gender}"></td>
                </tr>

                <tr>
                    <th>Дата рождения</th>
                    <td th:text="${client.birthDate}"></td>
                </tr>

                <tr>
                    <th>Ежемесячный доход</th>
                    <td th:text="${client.monthlyIncome}"></td>
                </tr>

                <tr>
                    <th>Кредитная история</th>
                    <td th:text="${client.creditHistoryScore}"></td>
                </tr>

                <tr>
                    <th>Текущая задолженность</th>
                    <td th:text="${client.currentCreditDebt}"></td>
                </tr>

                <tr>
                    <th>Наличие судимости</th>
                    <td>
                        <span class="badge"
                              th:classappend="${client.hasCriminalRecord} ? ' bg-danger' : ' bg-success'"
                              th:text="${client.hasCriminalRecord} ? 'Да' : 'Нет'">
                        </span>
                    </td>
                </tr>

            </table>

            <a class="btn btn-warning"
               th:href="@{/clients/{id}/edit(id=${client.id})}">
                Изменить
            </a>

            <a class="btn btn-secondary"
               th:href="@{/clients}">
                Назад
            </a>

        </div>
    </div>

</div>

</body>
</html>
