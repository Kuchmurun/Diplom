<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Клиенты</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/dashboard}">Pulsar Bank</a>

        <div class="navbar-nav">
            <a class="nav-link active" th:href="@{/clients}">Клиенты</a>
            <a class="nav-link" th:href="@{/credits}">Кредитные заявки</a>
            <a class="nav-link" th:href="@{/reports}">Отчёты</a>
            <a class="nav-link" th:href="@{/audit}">Журнал действий</a>
            <a class="nav-link" th:href="@{/employees}">Сотрудники</a>
        </div>

        <form method="post" th:action="@{/logout}">
            <button class="btn btn-outline-light btn-sm">Выйти</button>
        </form>
    </div>
</nav>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1>Клиенты</h1>

        <a class="btn btn-success" th:href="@{/clients/new}">
            Создать клиента
        </a>
    </div>

    <table class="table table-striped table-hover table-bordered shadow-sm bg-white">

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>ФИО</th>
            <th>Доход</th>
            <th>Кредитная история</th>
            <th>Действия</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="client : ${clients}">
            <td th:text="${client.id}"></td>
            <td th:text="${client.fullName}"></td>
            <td th:text="${client.monthlyIncome}"></td>
            <td th:text="${client.creditHistoryScore}"></td>
            <td>
                <a class="btn btn-primary btn-sm"
                   th:href="@{/clients/{id}(id=${client.id})}">
                    Просмотр
                </a>

                <a class="btn btn-warning btn-sm"
                   th:href="@{/clients/{id}/edit(id=${client.id})}">
                    Изменить
                </a>
            </td>
        </tr>
        </tbody>

    </table>

</div>

</body>
</html>
