<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Clients</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/dashboard}">Pulsar Bank</a>

        <div class="navbar-nav">
            <a class="nav-link active" th:href="@{/clients}">Clients</a>
            <a class="nav-link" th:href="@{/credits}">Credit applications</a>
            <a class="nav-link" th:href="@{/reports}">Reports</a>
            <a class="nav-link" th:href="@{/audit}">Audit log</a>
            <a class="nav-link" th:href="@{/employees}">Employees</a>
        </div>

        <form method="post" th:action="@{/logout}">
            <button class="btn btn-outline-light btn-sm">Logout</button>
        </form>
    </div>
</nav>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1>Clients</h1>

        <a class="btn btn-success" th:href="@{/clients/new}">
            Create client
        </a>
    </div>

    <table class="table table-striped table-hover table-bordered shadow-sm bg-white">

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Full name</th>
            <th>Income</th>
            <th>Credit history</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="client : ${clients}">
            <td th:text="${client.id}"></td>

            <td th:text="${client.fullName}"></td>

            <td th:text="${client.monthlyIncome}"></td>

            <td th:text="${client.creditHistoryScore}"></td>

            <td>

                <a class="btn btn-primary btn-sm"
                   th:href="@{/clients/{id}(id=${client.id})}">
                    View
                </a>

                <a class="btn btn-warning btn-sm"
                   th:href="@{/clients/{id}/edit(id=${client.id})}">
                    Edit
                </a>

            </td>
        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
