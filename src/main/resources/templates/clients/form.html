<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Форма клиента</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/dashboard}">Pulsar Bank</a>

        <div class="navbar-nav">
            <a class="nav-link active" th:href="@{/clients}">Клиенты</a>
            <a class="nav-link" th:href="@{/credits}">Кредитные заявки</a>
            <a class="nav-link" th:href="@{/reports}">Отчёты</a>
            <a class="nav-link" th:href="@{/audit}">Журнал действий</a>
            <a class="nav-link" th:href="@{/employees}">Сотрудники</a>
            <a class="nav-link" th:href="@{/backup}">Резервное копирование</a>
        </div>

        <form method="post" th:action="@{/logout}">
            <button class="btn btn-outline-light btn-sm">Выйти</button>
        </form>
    </div>
</nav>

<div class="container mt-4">

    <div class="card shadow-sm">
        <div class="card-header">
            <h2 class="mb-0">Данные клиента</h2>
        </div>

        <div class="card-body">

            <form method="post" th:action="@{/clients}" th:object="${client}">

                <input th:field="*{id}" type="hidden">

                <div class="mb-3">
                    <label class="form-label">ФИО</label>
                    <input class="form-control" required th:field="*{fullName}" type="text">
                </div>

                <div class="mb-3">
                    <label class="form-label">Пол</label>
                    <select class="form-select" required th:field="*{gender}">
                        <option th:each="gender : ${genders}"
                                th:text="${gender}"
                                th:value="${gender}">
                        </option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Дата рождения</label>
                    <input class="form-control" th:field="*{birthDate}" type="date">
                </div>

                <div class="mb-3">
                    <label class="form-label">Ежемесячный доход</label>
                    <input class="form-control" required step="0.01" th:field="*{monthlyIncome}" type="number">
                </div>

                <div class="mb-3">
                    <label class="form-label">Оценка кредитной истории</label>
                    <input class="form-control" required th:field="*{creditHistoryScore}" type="number">
                </div>

                <div class="mb-3">
                    <label class="form-label">Текущая кредитная задолженность</label>
                    <input class="form-control" required step="0.01" th:field="*{currentCreditDebt}" type="number">
                </div>

                <div class="form-check mb-3">
                    <input class="form-check-input" th:field="*{hasCriminalRecord}" type="checkbox">
                    <label class="form-check-label">
                        Наличие судимости
                    </label>
                </div>

                <button class="btn btn-success" type="submit">Сохранить</button>

                <a class="btn btn-secondary" th:href="@{/clients}">
                    Назад
                </a>

            </form>

        </div>
    </div>

</div>

</body>
</html>
