<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Client form</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/dashboard}">Pulsar Bank</a>

        <div class="navbar-nav">
            <a class="nav-link active" th:href="@{/clients}">Clients</a>
            <a class="nav-link" th:href="@{/credits}">Credit applications</a>
            <a class="nav-link" th:href="@{/reports}">Reports</a>
            <a class="nav-link" th:href="@{/audit}">Audit log</a>
            <a class="nav-link" th:href="@{/employees}">Employees</a>
        </div>

        <form method="post" th:action="@{/logout}">
            <button class="btn btn-outline-light btn-sm">Logout</button>
        </form>
    </div>
</nav>

<div class="container mt-4">

    <div class="card shadow-sm">
        <div class="card-header">
            <h2 class="mb-0">Client form</h2>
        </div>

        <div class="card-body">

            <form method="post" th:action="@{/clients}" th:object="${client}">

                <input th:field="*{id}" type="hidden">

                <div class="mb-3">
                    <label class="form-label">Full name</label>
                    <input class="form-control" required th:field="*{fullName}" type="text">
                </div>

                <div class="mb-3">
                    <label class="form-label">Gender</label>
                    <select class="form-select" required th:field="*{gender}">
                        <option th:each="gender : ${genders}"
                                th:text="${gender}"
                                th:value="${gender}">
                        </option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Birth date</label>
                    <input class="form-control" th:field="*{birthDate}" type="date">
                </div>

                <div class="mb-3">
                    <label class="form-label">Monthly income</label>
                    <input class="form-control" required step="0.01" th:field="*{monthlyIncome}" type="number">
                </div>

                <div class="mb-3">
                    <label class="form-label">Credit history score</label>
                    <input class="form-control" required th:field="*{creditHistoryScore}" type="number">
                </div>

                <div class="mb-3">
                    <label class="form-label">Current credit debt</label>
                    <input class="form-control" required step="0.01" th:field="*{currentCreditDebt}" type="number">
                </div>

                <div class="form-check mb-3">
                    <input class="form-check-input" th:field="*{hasCriminalRecord}" type="checkbox">
                    <label class="form-check-label">
                        Has criminal record
                    </label>
                </div>

                <button class="btn btn-success" type="submit">Save</button>

                <a class="btn btn-secondary" th:href="@{/clients}">
                    Back
                </a>

            </form>

        </div>
    </div>

</div>

</body>
</html>
