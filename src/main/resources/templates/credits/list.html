<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Credit applications</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/dashboard}">Pulsar Bank</a>

        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/clients}">Clients</a>
            <a class="nav-link active" th:href="@{/credits}">Credit applications</a>
            <a class="nav-link" th:href="@{/reports}">Reports</a>
            <a class="nav-link" th:href="@{/audit}">Audit log</a>
            <a class="nav-link" th:href="@{/employees}">Employees</a>
        </div>

        <form method="post" th:action="@{/logout}">
            <button class="btn btn-outline-light btn-sm">Logout</button>
        </form>
    </div>
</nav>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1>Credit applications</h1>

        <a class="btn btn-success" th:href="@{/credits/new}">
            Create application
        </a>
    </div>

    <table class="table table-striped table-hover table-bordered shadow-sm bg-white">

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Client</th>
            <th>Requested amount</th>
            <th>Months</th>
            <th>Status</th>
            <th>Created at</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="credit : ${applications}">
            <td th:text="${credit.id}"></td>
            <td th:text="${credit.client.fullName}"></td>
            <td th:text="${credit.requestedAmount}"></td>
            <td th:text="${credit.requestedMonths}"></td>

            <td>
                <span class="badge"
                      th:classappend="${credit.status.name() == 'APPROVED'} ? ' bg-success' :
                                      (${credit.status.name() == 'REJECTED'} ? ' bg-danger' :
                                      (${credit.status.name() == 'MANUAL_REVIEW'} ? ' bg-warning text-dark' : ' bg-secondary'))"
                      th:text="${credit.status}">
                </span>
            </td>

            <td th:text="${credit.createdAt}"></td>

            <td>
                <a class="btn btn-primary btn-sm"
                   th:href="@{/credits/{id}(id=${credit.id})}">
                    View
                </a>
            </td>
        </tr>
        </tbody>

    </table>

</div>

</body>
</html>
