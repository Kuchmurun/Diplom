<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Credit applications</title>
    <meta charset="UTF-8">
</head>
<body>

<h1>Credit applications</h1>

<a th:href="@{/clients}">Clients</a>
|
<a th:href="@{/credits/new}">Create application</a>

<a th:href="@{/credits}">Credit applications</a>

<br><br>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Client</th>
        <th>Requested amount</th>
        <th>Months</th>
        <th>Status</th>
        <th>Created at</th>
        <th>Actions</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="credit : ${applications}">
        <td th:text="${credit.id}"></td>
        <td th:text="${credit.client.fullName}"></td>
        <td th:text="${credit.requestedAmount}"></td>
        <td th:text="${credit.requestedMonths}"></td>
        <td th:text="${credit.status}"></td>
        <td th:text="${credit.createdAt}"></td>
        <td>
            <a th:href="@{/credits/{id}(id=${credit.id})}">Details</a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
