<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Создание кредитной заявки</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/dashboard}">Pulsar Bank</a>

        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/clients}">Клиенты</a>
            <a class="nav-link active" th:href="@{/credits}">Кредитные заявки</a>
            <a class="nav-link" th:href="@{/reports}">Отчёты</a>
            <a class="nav-link" th:href="@{/audit}">Журнал действий</a>
            <a class="nav-link" th:href="@{/employees}">Сотрудники</a>
        </div>

        <form method="post" th:action="@{/logout}">
            <button class="btn btn-outline-light btn-sm">Выйти</button>
        </form>
    </div>
</nav>

<div class="container mt-4">

    <div class="card shadow-sm">
        <div class="card-header">
            <h2 class="mb-0">Создание кредитной заявки</h2>
        </div>

        <div class="card-body">

            <div class="alert alert-danger" th:if="${error}">
                <span th:text="${error}"></span>
            </div>

            <form method="post" th:action="@{/credits}">

                <div class="mb-3">
                    <label class="form-label">Клиент</label>

                    <select class="form-select" name="clientId" required>
                        <option th:each="client : ${clients}"
                                th:selected="${client.id == selectedClientId}"
                                th:text="${client.fullName}"
                                th:value="${client.id}">
                        </option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Запрошенная сумма</label>

                    <input class="form-control"
                           name="requestedAmount"
                           required
                           step="0.01"
                           th:value="${requestedAmount}"
                           type="number">
                </div>

                <div class="mb-3">
                    <label class="form-label">Срок кредита, месяцев</label>

                    <input class="form-control"
                           name="requestedMonths"
                           required
                           th:value="${requestedMonths}"
                           type="number">
                </div>

                <button class="btn btn-success" type="submit">
                    Создать заявку
                </button>

                <a class="btn btn-secondary"
                   th:href="@{/credits}">
                    Назад
                </a>

            </form>

        </div>
    </div>

</div>

</body>
</html>
