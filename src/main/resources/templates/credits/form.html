<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create credit application</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/dashboard}">Pulsar Bank</a>

        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/clients}">Clients</a>
            <a class="nav-link active" th:href="@{/credits}">Credit applications</a>
            <a class="nav-link" th:href="@{/reports}">Reports</a>
            <a class="nav-link" th:href="@{/audit}">Audit log</a>
            <a class="nav-link" th:href="@{/employees}">Employees</a>
        </div>

        <form th:action="@{/logout}" method="post">
            <button class="btn btn-outline-light btn-sm">Logout</button>
        </form>
    </div>
</nav>

<div class="container mt-4">

    <div class="card shadow-sm">
        <div class="card-header">
            <h2 class="mb-0">Create credit application</h2>
        </div>

        <div class="card-body">

            <div th:if="${error}" class="alert alert-danger">
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/credits}" method="post">

                <div class="mb-3">
                    <label class="form-label">Client</label>

                    <select name="clientId" class="form-select" required>

                        <option th:each="client : ${clients}"
                                th:value="${client.id}"
                                th:text="${client.fullName}"
                                th:selected="${client.id == selectedClientId}">
                        </option>

                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Requested amount</label>

                    <input class="form-control"
                           type="number"
                           step="0.01"
                           name="requestedAmount"
                           required
                           th:value="${requestedAmount}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Requested months</label>

                    <input class="form-control"
                           type="number"
                           name="requestedMonths"
                           required
                           th:value="${requestedMonths}">
                </div>

                <button class="btn btn-success" type="submit">
                    Create application
                </button>

                <a class="btn btn-secondary"
                   th:href="@{/credits}">
                    Back
                </a>

            </form>

        </div>
    </div>

</div>

</body>
</html>
<a th:href="@{/credits}">Back</a>

</body>
</html>
