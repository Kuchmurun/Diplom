<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Credit application details</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/dashboard}">Pulsar Bank</a>

        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/clients}">Clients</a>
            <a class="nav-link active" th:href="@{/credits}">Credit applications</a>
            <a class="nav-link" th:href="@{/reports}">Reports</a>
            <a class="nav-link" th:href="@{/audit}">Audit log</a>
            <a class="nav-link" th:href="@{/employees}">Employees</a>
        </div>

        <form method="post" th:action="@{/logout}">
            <button class="btn btn-outline-light btn-sm">Logout</button>
        </form>
    </div>
</nav>

<div class="container mt-4">

    <div class="row g-4">

        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header">
                    <h2 class="mb-0">Credit application</h2>
                </div>

                <div class="card-body">

                    <table class="table table-bordered">
                        <tr>
                            <th>ID</th>
                            <td th:text="${credit.id}"></td>
                        </tr>
                        <tr>
                            <th>Client</th>
                            <td th:text="${credit.client.fullName}"></td>
                        </tr>
                        <tr>
                            <th>Requested amount</th>
                            <td th:text="${credit.requestedAmount}"></td>
                        </tr>
                        <tr>
                            <th>Requested months</th>
                            <td th:text="${credit.requestedMonths}"></td>
                        </tr>
                        <tr>
                            <th>Status</th>
                            <td>
                                <span class="badge"
                                      th:classappend="${credit.status.name() == 'APPROVED'} ? ' bg-success' :
                                                      (${credit.status.name() == 'REJECTED'} ? ' bg-danger' :
                                                      (${credit.status.name() == 'MANUAL_REVIEW'} ? ' bg-warning text-dark' : ' bg-secondary'))"
                                      th:text="${credit.status}">
                                </span>
                            </td>
                        </tr>
                    </table>

                    <form method="post" th:action="@{/credits/{id}/calculate(id=${credit.id})}">
                        <button class="btn btn-primary" type="submit">
                            Calculate credit reliability
                        </button>

                        <a class="btn btn-secondary" th:href="@{/credits}">
                            Back
                        </a>
                    </form>

                </div>
            </div>
        </div>

        <div class="col-md-6">

            <div class="card shadow-sm" th:if="${scoreResult == null}">
                <div class="card-header">
                    <h2 class="mb-0">Scoring result</h2>
                </div>

                <div class="card-body">
                    <div class="alert alert-info mb-0">
                        Scoring has not been calculated yet.
                    </div>
                </div>
            </div>

            <div class="card shadow-sm" th:if="${scoreResult != null}">
                <div class="card-header">
                    <h2 class="mb-0">Scoring result</h2>
                </div>

                <div class="card-body">

                    <div class="mb-3">
                        <h5>Score</h5>
                        <div class="progress" style="height: 30px;">
                            <div class="progress-bar"
                                 role="progressbar"
                                 th:style="'width: ' + ${scoreResult.score} + '%;'"
                                 th:text="${scoreResult.score + ' / 100'}">
                            </div>
                        </div>
                    </div>

                    <table class="table table-bordered">
                        <tr>
                            <th>Reliability level</th>
                            <td>
                                <span class="badge"
                                      th:classappend="${scoreResult.reliabilityLevel.name() == 'HIGH'} ? ' bg-success' :
                                                      (${scoreResult.reliabilityLevel.name() == 'MEDIUM'} ? ' bg-warning text-dark' : ' bg-danger')"
                                      th:text="${scoreResult.reliabilityLevel}">
                                </span>
                            </td>
                        </tr>
                        <tr>
                            <th>Approved amount</th>
                            <td th:text="${scoreResult.approvedAmount}"></td>
                        </tr>
                        <tr>
                            <th>Calculated at</th>
                            <td th:text="${scoreResult.calculatedAt}"></td>
                        </tr>
                    </table>

                    <div class="alert alert-secondary">
                        <strong>Decision reason:</strong>
                        <br>
                        <span th:text="${scoreResult.decisionReason}"></span>
                    </div>

                </div>
            </div>

        </div>

    </div>

</div>

</body>
</html>
