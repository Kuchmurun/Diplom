<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Pulsar Bank Dashboard</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/dashboard}">Pulsar Bank</a>

        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/clients}">Clients</a>
            <a class="nav-link" th:href="@{/credits}">Credit applications</a>
            <a class="nav-link" th:href="@{/reports}">Reports</a>
            <a class="nav-link" th:href="@{/audit}">Audit log</a>
            <a class="nav-link" th:href="@{/employees}">Employees</a>
        </div>

        <form class="d-flex" method="post" th:action="@{/logout}">
            <button class="btn btn-outline-light btn-sm" type="submit">Logout</button>
        </form>
    </div>
</nav>

<div class="container mt-4">

    <h1 class="mb-4">Dashboard</h1>

    <div class="row g-3">

        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5>Clients</h5>
                    <h2 th:text="${clientsCount}"></h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5>Employees</h5>
                    <h2 th:text="${employeesCount}"></h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5>Credit applications</h5>
                    <h2 th:text="${applicationsCount}"></h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card border-success shadow-sm">
                <div class="card-body">
                    <h5>Approved</h5>
                    <h2 th:text="${approvedCount}"></h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card border-danger shadow-sm">
                <div class="card-body">
                    <h5>Rejected</h5>
                    <h2 th:text="${rejectedCount}"></h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card border-warning shadow-sm">
                <div class="card-body">
                    <h5>Manual review</h5>
                    <h2 th:text="${manualReviewCount}"></h2>
                </div>
            </div>
        </div>

    </div>

    <hr class="my-4">

    <h3>Administration</h3>

    <form method="post" th:action="@{/admin/backup}">
        <button class="btn btn-primary" type="submit">Create database backup</button>
    </form>

</div>

</body>
</html>
