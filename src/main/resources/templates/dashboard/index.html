<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>
    <meta charset="UTF-8">
</head>
<body>

<h1>Pulsar Bank Dashboard</h1>

<a th:href="@{/clients}">Clients</a>

<a th:href="@{/credits}">Credit applications</a>

<a th:href="@{/audit}">Audit log</a>

<a th:href="@{/employees}">Employees</a>

<a th:href="@{/reports}">Reports</a>

<br><br>

<table border="1">
    <tr>
        <th>Metric</th>
        <th>Value</th>
    </tr>
    <tr>
        <td>Clients</td>
        <td th:text="${clientsCount}"></td>
    </tr>
    <tr>
        <td>Employees</td>
        <td th:text="${employeesCount}"></td>
    </tr>
    <tr>
        <td>Credit applications</td>
        <td th:text="${applicationsCount}"></td>
    </tr>
    <tr>
        <td>Approved applications</td>
        <td th:text="${approvedCount}"></td>
    </tr>
    <tr>
        <td>Rejected applications</td>
        <td th:text="${rejectedCount}"></td>
    </tr>
    <tr>
        <td>Manual review applications</td>
        <td th:text="${manualReviewCount}"></td>
    </tr>
</table>

<h2>Administration</h2>

<form method="post" th:action="@{/admin/backup}">
    <button type="submit">Create database backup</button>
</form>

<br>

<form method="post" th:action="@{/logout}">
    <button type="submit">Logout</button>
</form>

</body>
</html>
