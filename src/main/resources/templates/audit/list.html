<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Audit log</title>
    <meta charset="UTF-8">
</head>
<body>

<h1>Audit log</h1>

<a th:href="@{/clients}">Clients</a>

<a th:href="@{/credits}">Credit applications</a>

<a th:href="@{/employees}">Employees</a>


<br><br>

<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Employee</th>
        <th>Action</th>
        <th>Entity type</th>
        <th>Entity ID</th>
        <th>Details</th>
        <th>Created at</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="log : ${logs}">
        <td th:text="${log.id}"></td>
        <td th:text="${log.employeeUsername}"></td>
        <td th:text="${log.action}"></td>
        <td th:text="${log.entityType}"></td>
        <td th:text="${log.entityId}"></td>
        <td th:text="${log.details}"></td>
        <td th:text="${log.createdAt}"></td>
    </tr>
    </tbody>
</table>

</body>
</html>
