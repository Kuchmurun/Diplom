<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Журнал действий</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/dashboard}">Pulsar Bank</a>

        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/clients}">Клиенты</a>
            <a class="nav-link" th:href="@{/credits}">Кредитные заявки</a>
            <a class="nav-link" th:href="@{/reports}">Отчёты</a>
            <a class="nav-link active" th:href="@{/audit}">Журнал действий</a>
            <a class="nav-link" th:href="@{/employees}">Сотрудники</a>
            <a class="nav-link" th:href="@{/backup}">Резервное копирование</a>
        </div>

        <form method="post" th:action="@{/logout}">
            <button class="btn btn-outline-light btn-sm">Выйти</button>
        </form>
    </div>
</nav>

<div class="container mt-4">

    <h1 class="mb-4">Журнал действий</h1>

    <div class="card shadow-sm">

        <div class="card-body">

            <table class="table table-striped table-hover table-bordered">

                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Сотрудник</th>
                    <th>Действие</th>
                    <th>Тип объекта</th>
                    <th>ID объекта</th>
                    <th>Описание</th>
                    <th>Дата и время</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="log : ${logs}">

                    <td th:text="${log.id}"></td>

                    <td th:text="${log.employeeUsername}"></td>

                    <td>
                        <span class="badge bg-primary"
                              th:text="${log.action}">
                        </span>
                    </td>

                    <td th:text="${log.entityType}"></td>

                    <td th:text="${log.entityId}"></td>

                    <td th:text="${log.details}"></td>

                    <td th:text="${log.createdAt}"></td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
