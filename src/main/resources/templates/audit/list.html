<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Audit log</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/dashboard}">Pulsar Bank</a>

        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/clients}">Clients</a>
            <a class="nav-link" th:href="@{/credits}">Credit applications</a>
            <a class="nav-link" th:href="@{/reports}">Reports</a>
            <a class="nav-link active" th:href="@{/audit}">Audit log</a>
            <a class="nav-link" th:href="@{/employees}">Employees</a>
        </div>

        <form method="post" th:action="@{/logout}">
            <button class="btn btn-outline-light btn-sm">Logout</button>
        </form>
    </div>
</nav>

<div class="container mt-4">

    <h1 class="mb-4">Audit log</h1>

    <div class="card shadow-sm">
        <div class="card-body">

            <table class="table table-striped table-hover table-bordered">

                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Employee</th>
                    <th>Action</th>
                    <th>Entity type</th>
                    <th>Entity ID</th>
                    <th>Details</th>
                    <th>Created at</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="log : ${logs}">
                    <td th:text="${log.id}"></td>
                    <td th:text="${log.employeeUsername}"></td>

                    <td>
                        <span class="badge bg-primary"
                              th:text="${log.action}">
                        </span>
                    </td>

                    <td th:text="${log.entityType}"></td>
                    <td th:text="${log.entityId}"></td>
                    <td th:text="${log.details}"></td>
                    <td th:text="${log.createdAt}"></td>
                </tr>
                </tbody>

            </table>

        </div>
    </div>

</div>

</body>
</html>
