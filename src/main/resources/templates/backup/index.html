<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Резервное копирование</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/dashboard}">Pulsar Bank</a>

        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/clients}">Клиенты</a>
            <a class="nav-link" th:href="@{/credits}">Кредитные заявки</a>
            <a class="nav-link" th:href="@{/reports}">Отчёты</a>
            <a class="nav-link" th:href="@{/audit}">Журнал действий</a>
            <a class="nav-link" th:href="@{/employees}">Сотрудники</a>
            <a class="nav-link active" th:href="@{/backup}">Резервное копирование</a>
        </div>

        <form method="post" th:action="@{/logout}">
            <button class="btn btn-outline-light btn-sm">Выйти</button>
        </form>
    </div>
</nav>

<div class="container mt-4">

    <div class="card shadow-sm">
        <div class="card-header">
            <h2 class="mb-0">Резервное копирование базы данных</h2>
        </div>

        <div class="card-body">

            <form method="post" th:action="@{/backup/create}">
                <button class="btn btn-primary" type="submit">
                    Создать резервную копию
                </button>
            </form>
        </div>
    </div>

</div>

</body>
</html>
