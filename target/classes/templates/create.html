<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Добавление кошелька</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<h1>Добавление кошелька</h1>
<form method="post" th:action="@{/create}" th:object="${walletDTO}">
    <label>Фамилия: <br><input name="last_name" th:field="*{last_name}" type="text">
        <span class="field-error" th:errors="*{last_name}" th:if="${#fields.hasErrors('last_name')}"></span>
    </label><br>

    <label>Имя: <br><input name="first_name" th:field="*{first_name}" type="text">
        <span class="field-error" th:errors="*{first_name}" th:if="${#fields.hasErrors('first_name')}"></span>
    </label><br>

    <label>Отчество: <br><input name="middle_name" th:field="*{middle_name}" type="text">
        <span class="field-error" th:errors="*{middle_name}" th:if="${#fields.hasErrors('middle_name')}"></span>
    </label><br>

    <label>Номер паспорта: <br><input name="passport_id" th:field="*{passport_id}" type="number">
        <span class="field-error" th:errors="*{passport_id}" th:if="${#fields.hasErrors('passport_id')}"></span>
    </label><br>

    <label>Рубли: <br><input name="rub" th:field="*{rub}" type="number">
        <span class="field-error" th:errors="*{rub}" th:if="${#fields.hasErrors('rub')}"></span>
    </label><br>
    <label>Доллары: <br><input name="usd" th:field="*{usd}" type="number">
        <span class="field-error" th:errors="*{usd}" th:if="${#fields.hasErrors('usd')}"></span>
    </label><br>
    <label>Евро: <br><input name="eur" th:field="*{eur}" type="number">
        <span class="field-error" th:errors="*{eur}" th:if="${#fields.hasErrors('eur')}"></span>
    </label><br>
    <br>
    <button type="submit">Сохранить</button>
    <a th:href="@{/index}">
        <button type="button">Вернуться на главную</button>
    </a>
</form>
</body>
</html>
