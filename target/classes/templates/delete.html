<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Удаление кошелька</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<h1>Удаление кошелька</h1>
<form method="post" th:action="@{/delete}" th:object="${deleteDto}">
    <label>Введите айди для удаления:</label><br><br>
    <label><input name="id" th:field="*{id}" type="number">
        <span class="field-error" th:errors="*{id}" th:if="${#fields.hasErrors('id')}"></span>
    </label><br><br>
    <button type="submit">Удалить</button>
    <a th:href="@{/index}">
        <button type="button">Вернуться на главную</button>
    </a>
</form>
</body>
</html>
