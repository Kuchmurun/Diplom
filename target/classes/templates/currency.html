<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Обмен валют</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<h1>Обмен валют</h1>
<form method="post" th:action="@{/currency}" th:object="${currencyDto}">
    <label>Номер кошелька:</label><br><br>
    <label><input name="id" th:field="*{id}"/>
        <span class="field-error" th:errors="*{id}" th:if="${#fields.hasErrors('id')}"></span>
        <br><br></label>
    <label>Операция:</label>
    <label>
        <select name="operation" th:field="*{operation}">
            <option value="RUB:USD">Рубли -> Доллары</option>
            <option value="RUB:EUR">Рубли -> Евро</option>
            <option value="USD:RUB">Доллары -> Рубли</option>
            <option value="USD:EUR">Доллары -> Евро</option>
            <option value="EUR:RUB">Евро -> Рубли</option>
            <option value="EUR:USD">Евро -> Доллары</option>
        </select>
        <span class="field-error" th:errors="*{operation}" th:if="${#fields.hasErrors('operation')}"></span>
    </label>
    <br><br>
    <label>Сумма:</label><br><br>
    <label><input name="amount" th:field="*{amount}"/>
        <span class="field-error" th:errors="*{amount}" th:if="${#fields.hasErrors('amount')}"></span>
    </label><br><br>
    <button type="submit">Совершить обмен валют.</button>
    <a th:href="@{/index}">
        <button type="button">Вернуться на главную</button>
    </a>
</form>
</body>
</html>
